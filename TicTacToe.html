<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lucide-icons@latest/dist/style.css">
    <title>Tic Tac Toe</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f4f6;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        .cell {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid #4b5563;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="flex flex-col items-center">
        <h1 class="text-4xl mb-4">Tic Tac Toe</h1>
        <div class="board" id="board"></div>
        <button id="restart" class="mt-4 p-2 bg-blue-500 text-white rounded">Restart</button>
    </div>
    <script>
        const board = document.getElementById('board');
        const restartButton = document.getElementById('restart');
        let cells = [];
        let currentPlayer = 'X';
        let gameActive = true;
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function createBoard() {
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
                cells.push(cell);
            }
        }

        function handleCellClick(event) {
            const clickedCell = event.target;
            const index = clickedCell.getAttribute('data-index');
            if (cells[index].textContent === '' && gameActive) {
                clickedCell.textContent = currentPlayer;
                checkWin();
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            }
        }

        function checkWin() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const condition = winningConditions[i];
                const a = cells[condition[0]].textContent;
                const b = cells[condition[1]].textContent;
                const c = cells[condition[2]].textContent;
                if (a === '' || b === '' || c === '') {
                    continue;
                }
                if (a === b && b === c) {
                    roundWon = true;
                    break;
                }
            }
            roundWon ? handleWin() : handleDraw();
        }

        function handleWin() {
            gameActive = false;
            alert(`Player ${currentPlayer} wins!`);
        }

        function handleDraw() {
            const draw = cells.every(cell => cell.textContent !== '');
            if (draw) {
                alert('Game ended in a draw!');
                gameActive = false;
            }
        }

        restartButton.addEventListener('click', () => {
            gameActive = true;
            currentPlayer = 'X';
            cells.forEach(cell => cell.textContent = '');
        });

        createBoard();
    </script>
</body>
</html>
